<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Müzik</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: Arial;
}

.bg {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* PLAYER */
.player {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px;
  border-radius:25px;
  text-align:center;
  background:rgba(0,0,0,0);
}

/* FOTO */
.cover {
  width:130px;
  height:130px;
  border-radius:20px;
  object-fit:cover;
}

/* BUTON */
button {
  margin:8px;
  padding:10px;
  border:none;
  border-radius:50%;
  background:linear-gradient(45deg,#ff4da6,#ff80bf);
  color:white;
  font-size:14px;
  cursor:pointer;
}

/* BAR */
input[type=range] {
  width:180px;
  height:4px;
}

/* İMLEÇ KÜÇÜK */
input[type=range]::-webkit-slider-thumb {
  width:10px;
  height:10px;
}

/* MOBİL */
@media (max-width:600px){
  .cover{width:90px;height:90px;}
  input[type=range]{width:120px;}
  button{padding:8px;font-size:12px;}
}

/* KALPLER */
.heart {
  position:fixed;
  animation:fall linear infinite;
}
@keyframes fall {
  from { transform:translateY(-10px); }
  to { transform:translateY(100vh); }
}
</style>
</head>

<body>

<img src="foto.jpg" class="bg">

<div class="player">
  <img id="cover" src="cover1.jpg" class="cover">

  <h3 id="title">Şarkı 1</h3>

  <div>
    <button onclick="prev()">⏮</button>
    <button onclick="play()">▶</button>
    <button onclick="pause()">⏸</button>
    <button onclick="next()">⏭</button>
  </div>

  <div>
    <span id="current">0:00</span>
    <input type="range" id="progress" value="0">
    <span id="duration">0:00</span>
  </div>

  <div>
    🔊 <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<audio id="audio"></audio>

<script>
const songs = [
  {name:"Şarkı 1", file:"sarki1.mp3", cover:"cover1.jpg"},
  {name:"Şarkı 2", file:"sarki2.mp3", cover:"cover2.jpg"},
  {name:"Şarkı 3", file:"sarki3.mp3", cover:"cover3.jpg"}
];

let index = 0;
const audio = document.getElementById("audio");

function load(){
  audio.src = songs[index].file;
  document.getElementById("title").innerText = songs[index].name;
  document.getElementById("cover").src = songs[index].cover;
}
load();

function play(){ audio.play(); }
function pause(){ audio.pause(); }

function next(){
  index = (index+1)%songs.length;
  load(); play();
}

function prev(){
  index = (index-1+ songs.length)%songs.length;
  load(); play();
}

/* PROGRESS */
audio.addEventListener("timeupdate", ()=>{
  const progress = document.getElementById("progress");
  progress.value = (audio.currentTime/audio.duration)*100 || 0;

  document.getElementById("current").innerText =
    format(audio.currentTime);

  document.getElementById("duration").innerText =
    format(audio.duration);
});

document.getElementById("progress").oninput = function(){
  audio.currentTime = (this.value/100)*audio.duration;
};

/* VOLUME */
document.getElementById("volume").oninput = function(){
  audio.volume = this.value;
};

function format(s){
  if(!s) return "0:00";
  let m = Math.floor(s/60);
  let sec = Math.floor(s%60);
  return m+":"+(sec<10?"0":"")+sec;
}

/* KALPLER */
setInterval(()=>{
  let heart = document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"%";
  heart.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),5000);
},300);
</script>

</body>
</html>
